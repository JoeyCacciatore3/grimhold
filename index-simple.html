<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimhold</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #ffffff;
        }

        #game-canvas {
            display: block;
            background: #2a2a2a;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <script>
        // Simple demo without modules
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Simple grid variables
        const TILE_SIZE = 32;
        const MAP_WIDTH = 40;
        const MAP_HEIGHT = 30;
        
        let cameraX = 0;
        let cameraY = 0;
        let mouseX = 0;
        let mouseY = 0;
        let hoverTileX = 0;
        let hoverTileY = 0;
        
        // Input handling
        const keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            
            // Calculate hover tile
            hoverTileX = Math.floor((mouseX + cameraX) / TILE_SIZE);
            hoverTileY = Math.floor((mouseY + cameraY) / TILE_SIZE);
        });
        
        // Simple terrain (0=grass, 1=water, 2=stone, 4=forest, 5=mountain)
        const terrain = [];
        for (let y = 0; y < MAP_HEIGHT; y++) {
            const row = [];
            for (let x = 0; x < MAP_WIDTH; x++) {
                if (x === 0 || x === MAP_WIDTH-1 || y === 0 || y === MAP_HEIGHT-1) {
                    row.push(5); // Mountains on edges
                } else if (x > 15 && x < 25 && y > 10 && y < 15) {
                    row.push(1); // Water in center
                } else if (Math.random() < 0.1) {
                    row.push(4); // Random forests
                } else {
                    row.push(0); // Grass
                }
            }
            terrain.push(row);
        }
        
        // Colors for terrain
        const terrainColors = {
            0: '#2d5016', // Grass
            1: '#1e3a5f', // Water
            2: '#666666', // Stone
            4: '#0f3a0f', // Forest
            5: '#444444'  // Mountain
        };
        
        function update() {
            // Camera movement
            const panSpeed = 200;
            const deltaTime = 1/60;
            
            if (keys['KeyW']) cameraY -= panSpeed * deltaTime;
            if (keys['KeyS']) cameraY += panSpeed * deltaTime;
            if (keys['KeyA']) cameraX -= panSpeed * deltaTime;
            if (keys['KeyD']) cameraX += panSpeed * deltaTime;
            
            // Clamp camera
            const maxX = (MAP_WIDTH * TILE_SIZE) - canvas.width;
            const maxY = (MAP_HEIGHT * TILE_SIZE) - canvas.height;
            cameraX = Math.max(0, Math.min(cameraX, maxX));
            cameraY = Math.max(0, Math.min(cameraY, maxY));
        }
        
        function render() {
            // Clear
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Calculate visible tiles
            const startX = Math.floor(cameraX / TILE_SIZE);
            const startY = Math.floor(cameraY / TILE_SIZE);
            const endX = Math.min(startX + Math.ceil(canvas.width / TILE_SIZE) + 1, MAP_WIDTH);
            const endY = Math.min(startY + Math.ceil(canvas.height / TILE_SIZE) + 1, MAP_HEIGHT);
            
            // Draw terrain
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    if (x >= 0 && x < MAP_WIDTH && y >= 0 && y < MAP_HEIGHT) {
                        const screenX = x * TILE_SIZE - cameraX;
                        const screenY = y * TILE_SIZE - cameraY;
                        
                        const terrainType = terrain[y][x];
                        ctx.fillStyle = terrainColors[terrainType];
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
            
            // Draw grid
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            
            // Vertical lines
            for (let x = startX; x <= endX; x++) {
                const screenX = x * TILE_SIZE - cameraX;
                ctx.moveTo(screenX, 0);
                ctx.lineTo(screenX, canvas.height);
            }
            
            // Horizontal lines
            for (let y = startY; y <= endY; y++) {
                const screenY = y * TILE_SIZE - cameraY;
                ctx.moveTo(0, screenY);
                ctx.lineTo(canvas.width, screenY);
            }
            ctx.stroke();
            
            // Draw hover highlight
            if (hoverTileX >= 0 && hoverTileX < MAP_WIDTH && hoverTileY >= 0 && hoverTileY < MAP_HEIGHT) {
                const screenX = hoverTileX * TILE_SIZE - cameraX;
                const screenY = hoverTileY * TILE_SIZE - cameraY;
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
            }
            
            // Draw debug info
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(10, 10, 250, 80);
            
            ctx.fillStyle = '#00ff00';
            ctx.font = '12px monospace';
            ctx.fillText(`Mouse: ${hoverTileX}, ${hoverTileY}`, 15, 25);
            ctx.fillText(`Camera: ${Math.round(cameraX)}, ${Math.round(cameraY)}`, 15, 40);
            ctx.fillText('WASD: Pan camera', 15, 55);
            ctx.fillText('Grimhold - Phase 2 Demo', 15, 70);
        }
        
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        // Start the demo
        console.log('🏰 Grimhold Simple Demo Started');
        gameLoop();
    </script>
</body>
</html>
